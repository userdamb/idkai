<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDK — AI-сотрудники для бизнеса</title>
    <!-- tailwind грузим прямо с CDN, чтобы не возиться со сборкой стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // донастраиваем tailwind: наши золотые цвета и шрифт Inter
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gold: {
                DEFAULT: '#EBCB8B',
                dim: '#D4AF37',
                bright: '#FFD700',
              },
              surface: {
                1: '#0a0a0a',
                2: '#111111',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            backgroundImage: {
              'gold-gradient': 'linear-gradient(135deg, #EBCB8B 0%, #D4AF37 100%)',
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- скрипт гугл-входа (Google Identity Services) — рисует кнопку в AuthModal -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      /* общие css-переменные темы, чтобы цвета не были раскиданы по всему файлу */
      :root {
          --bg-page: #000000;
          --surface-1: #0a0a0a;
          --surface-2: #111111;
          --border-subtle: rgba(255, 255, 255, 0.06);
          --border-glow: rgba(235, 203, 139, 0.3);
          --text-primary: #ffffff;
          --text-secondary: rgba(255, 255, 255, 0.6);
          --text-tertiary: rgba(255, 255, 255, 0.4);
          --gold: #EBCB8B;
          --gold-bright: #FFD700;
          --gold-dim: #D4AF37;
      }

      html { scroll-behavior: smooth; }
      body {
          font-family: 'Inter', sans-serif;
          background-color: var(--bg-page);
          color: var(--text-secondary);
          line-height: 1.6;
          -webkit-font-smoothing: antialiased;
          overflow-x: hidden;
      }

      /* фоновая подсветка-прожектор за всем контентом, тихонько плавает */
      .bg-spotlight {
          position: fixed;
          inset: 0;
          pointer-events: none;
          z-index: -1;
          overflow: hidden;
      }
      .bg-spotlight::before {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background:
              radial-gradient(ellipse 600px 400px at 30% 20%, rgba(235, 203, 139, 0.08), transparent 50%),
              radial-gradient(ellipse 500px 300px at 70% 60%, rgba(235, 203, 139, 0.05), transparent 50%),
              radial-gradient(ellipse 400px 400px at 50% 80%, rgba(100, 80, 60, 0.04), transparent 50%);
          animation: bg-drift 20s ease-in-out infinite;
      }
      .bg-spotlight::after {
          content: '';
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 100%;
          height: 60%;
          background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(235, 203, 139, 0.08), transparent 70%);
      }
      @keyframes bg-drift {
          0%, 100% { transform: translate(0, 0) rotate(0deg); }
          25% { transform: translate(2%, 1%) rotate(1deg); }
          50% { transform: translate(-1%, 2%) rotate(-1deg); }
          75% { transform: translate(-2%, -1%) rotate(0.5deg); }
      }

      /* еле заметное зерно/шум поверх фона (svg-шум прямо в css), чтобы не было плоско */
      body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          opacity: 0.03;
          pointer-events: none;
          z-index: -1;
      }

      .badge-glow {
          animation: badge-pulse 3s ease-in-out infinite;
      }
      @keyframes badge-pulse {
          0%, 100% { box-shadow: 0 0 0 0 rgba(235, 203, 139, 0); }
          50% { box-shadow: 0 0 20px 2px rgba(235, 203, 139, 0.2); }
      }
      .badge-dot {
          animation: dot-pulse 2s ease-in-out infinite;
      }
      @keyframes dot-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(0.5); opacity: 0.4; }
      }

      /* крупный заголовок с градиентом из белого в золото */
      .heading-hero {
          font-size: clamp(2.5rem, 7vw, 5rem);
          font-weight: 600;
          letter-spacing: -0.04em;
          line-height: 1;
          background: linear-gradient(180deg, #FFFFFF 20%, #EBCB8B 100%);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
          text-shadow: 0 0 80px rgba(235, 203, 139, 0.3);
      }
      .heading-section {
          font-size: clamp(1.75rem, 4vw, 2.75rem);
          font-weight: 700;
          letter-spacing: -0.03em;
          line-height: 1.1;
          color: var(--text-primary);
      }

      .text-gradient-gold {
          background: linear-gradient(135deg, #FFD700 0%, #D4AF37 100%);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
      }

      /* базовая карточка в стиле "как у эпла" — используется почти везде */
      .apple-card {
          background: var(--surface-2);
          border: 1px solid var(--border-subtle);
          border-radius: 24px;
          padding: 2rem;
          position: relative;
          transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
          overflow: hidden;
      }
      .apple-card::before {
          display: none;
      }

      .btn-gold-primary {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 1rem 2.5rem;
          border-radius: 9999px;
          background: linear-gradient(135deg, #EBCB8B 0%, #D4AF37 100%);
          color: #050505;
          font-weight: 700;
          font-size: 1rem;
          transition: all 0.3s ease;
          box-shadow: 0 0 30px rgba(235, 203, 139, 0.2);
      }
      .btn-gold-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 0 50px rgba(235, 203, 139, 0.4);
      }

      .btn-outline {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 0.75rem 1.5rem;
          border-radius: 9999px;
          border: 1px solid rgba(255,255,255,0.1);
          color: #ffffff;
          font-weight: 500;
          font-size: 0.875rem;
          transition: all 0.3s ease;
      }
      .btn-outline:hover {
          border-color: rgba(255,255,255,0.3);
          background: rgba(255,255,255,0.05);
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.2",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.jsx"></script>
</body>
</html>
